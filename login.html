<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quản Lý Khoản Vay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
</head>

<body>
    <script src="js/utils.js"></script>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <button class="theme-toggle" id="themeToggleBtn" title="Chuyển giao diện Đậm/Nhạt">
        <i class="fas fa-moon"></i>
    </button>

    <div class="auth-wrapper">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <h1>Tài Chính Cá Nhân</h1>
                <p>Hệ thống Quản lý khoản vay thông minh</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">Đăng Nhập</div>
                <div class="auth-tab" data-tab="register">Đăng Ký</div>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" class="form-control" name="username" placeholder="Nhập tên đăng nhập" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control" name="password" placeholder="Nhập mật khẩu" required>
                </div>
                <div id="loginError" class="error-message">Tên đăng nhập hoặc mật khẩu không chính xác.</div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Đăng Nhập <i
                        class="fas fa-arrow-right"></i></button>
                <div style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.85rem;">
                    Khách demo: `khachhang1` / `123`
                </div>
            </form>

            <form id="registerForm" class="auth-form" style="max-height: 450px; overflow-y: auto; padding-right: 5px;">
                <div class="form-group">
                    <label class="form-label">Họ và Tên</label>
                    <input type="text" class="form-control" name="fullname" placeholder="Nhập họ và tên" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Số điện thoại</label>
                    <input type="text" class="form-control" name="phone" placeholder="Nhập 10 số ĐT" 
                        pattern="0[0-9]{9}" title="Nhập đúng 10 số bắt đầu bằng 0" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Số CCCD</label>
                    <input type="text" class="form-control" name="idCard" placeholder="Nhập 12 số CCCD" 
                        pattern="[0-9]{12}" title="Nhập đúng 12 số CCCD" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Địa chỉ</label>
                    <input type="text" class="form-control" name="address" placeholder="Nhập địa chỉ" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Nghề nghiệp</label>
                    <input type="text" class="form-control" name="job" placeholder="Nhập nghề nghiệp" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Thu nhập hàng tháng</label>
                    <input type="number" class="form-control" name="income" placeholder="VD: 15000000" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Tên đăng nhập mới</label>
                    <input type="text" class="form-control" name="regUsername" placeholder="Nhập tên đăng nhập" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control" name="regPassword" placeholder="Tạo mật khẩu" required>
                </div>
                <div id="regError" class="error-message">Có lỗi xảy ra.</div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin: 1rem 0;">Tạo Tài Khoản <i class="fas fa-user-plus"></i></button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script>
        // Check if already logged in
        document.addEventListener("DOMContentLoaded", () => {
            const user = DataService.getCurrentUser();
            const token = localStorage.getItem('token');
            const urlParams = new URLSearchParams(window.location.search);
            const isExpired = urlParams.get('session') === 'expired';

            if (user && token && !isExpired) {
                // Chỉ chuyển hướng nếu thực sự có cả user và token hợp lệ
                window.location.href = user.role === 'admin' ? 'admin.html' : 'customer.html';
            } else if (!isExpired) {
                // Nếu dữ liệu không đồng nhất (thiếu 1 trong 2) mà không phải do logout chủ động, thì xóa sạch để dừng loop
                localStorage.removeItem('currentUser');
                localStorage.removeItem('token');
            }

            // Kiểm tra session hết hạn để hiện thông báo
            if (isExpired) {
                Toast.warn('Phiên làm việc đã hết hạn! Vui lòng đăng nhập lại để tiếp tục 24/24.');
            }

            // Tab switching logic
            const tabs = document.querySelectorAll('.auth-tab');
            const forms = document.querySelectorAll('.auth-form');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const target = tab.dataset.tab;

                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    forms.forEach(f => {
                        f.classList.remove('active');
                        if (f.id === `${target}Form`) {
                            f.classList.add('active');
                        }
                    });
                });
            });

            // Theme Toggle Logic Update Icon
            const themeBtn = document.getElementById('themeToggleBtn');
            const updateThemeIcon = () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                themeBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            };

            updateThemeIcon(); // init

            themeBtn.addEventListener('click', () => {
                toggleTheme();
                updateThemeIcon();
            });

            // Login Submit
            const loginForm = document.getElementById('loginForm');
            const loginError = document.getElementById('loginError');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                loginError.style.display = 'none';

                const username = loginForm.username.value;
                const password = loginForm.password.value;

                showLoader();
                try {
                    const response = await fetch(`${Config.BASE_URL}/api/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        localStorage.setItem('currentUser', JSON.stringify(data.user));
                        localStorage.setItem('token', data.token); // Lưu token bảo mật
                        Toast.success('Đăng nhập thành công!');
                        setTimeout(() => {
                            window.location.href = data.user.role === 'admin' ? 'admin.html' : 'customer.html';
                        }, 1000);
                    } else {
                        const errorData = await response.json();
                        const msg = errorData.message || 'Tên đăng nhập hoặc mật khẩu không chính xác.';
                        Toast.error(msg);
                        loginError.textContent = msg;
                        loginError.style.display = 'block';
                        const card = document.querySelector('.auth-card');
                        card.style.animation = 'shake 0.5s';
                        setTimeout(() => card.style.animation = '', 500);
                    }
                } catch (err) {
                    Toast.error('Lỗi kết nối server');
                    loginError.textContent = 'Không thể kết nối tới Backend Server!';
                    loginError.style.display = 'block';
                } finally {
                    hideLoader();
                }
            });

            // Register Submit
            const registerForm = document.getElementById('registerForm');
            const regError = document.getElementById('regError');

            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                regError.style.display = 'none';

                const fullname = registerForm.fullname.value;
                const username = registerForm.regUsername.value;
                const password = registerForm.regPassword.value;
                const phone = registerForm.phone.value;
                const idCard = registerForm.idCard.value;
                const address = registerForm.address.value;
                const job = registerForm.job.value;
                const income = registerForm.income.value;

                showLoader();
                try {
                    const response = await fetch(`${Config.BASE_URL}/api/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            username, 
                            password, 
                            name: fullname,
                            phone,
                            idCard,
                            address,
                            job,
                            income
                        })
                    });

                    if (response.ok) {
                        const newUser = await response.json();
                        localStorage.setItem('currentUser', JSON.stringify(newUser));
                        Toast.success('Đăng ký thành công!');
                        setTimeout(() => {
                            window.location.href = 'customer.html';
                        }, 1000);
                    } else {
                        const errorData = await response.json();
                        const msg = errorData.message || 'Có lỗi xảy ra.';
                        Toast.error(msg);
                        regError.textContent = msg;
                        regError.style.display = 'block';
                    }
                } catch (err) {
                    Toast.error('Lỗi kết nối server');
                } finally {
                    hideLoader();
                }
            });
        });

        // Add shake animation inside style on the fly if needed
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0% { transform: translateX(0); }
                25% { transform: translateX(5px); }
                50% { transform: translateX(-5px); }
                75% { transform: translateX(5px); }
                100% { transform: translateX(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>

</html>
